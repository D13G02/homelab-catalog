apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calico
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://projectcalico.docs.tigera.io/charts
    chart: tigera-operator
    targetRevision: v3.28.0

    helm:
      valueFiles:
        - $values/platform/calico/values/default.yaml

    # conecta el repo git para leer values
  sources:
    - repoURL: https://projectcalico.docs.tigera.io/charts
      chart: tigera-operator
      targetRevision: v3.28.0
      helm:
        valueFiles:
          - $values/platform/calico/values/default.yaml

    - repoURL: https://github.com/TU_ORG/gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: tigera-operator

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
