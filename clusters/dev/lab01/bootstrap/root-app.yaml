apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab01.dev
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/D13G02/homelab-gitops.git
    targetRevision: main
    path: clusters/dev/lab01
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
