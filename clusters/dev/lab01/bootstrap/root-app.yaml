apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab01-root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/org/gitops.git
    targetRevision: main
    path: clusters/dev/lab01

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
